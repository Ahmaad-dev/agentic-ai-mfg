<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard — Kennzahlen zur Human-in-the-Loop-Governance">

    <title>Dashboard</title>

    <!-- Favicon (Inline SVG, identisch zu index.html) -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2306b6d4'/%3E%3Cstop offset='100%25' stop-color='%2384cc16'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M12 2.5L20.66 7.5V17.5L12 22.5L3.34 17.5V7.5L12 2.5Z' stroke='url(%23g)' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M12 8L16.33 10.5V15.5L12 18L7.67 15.5V10.5L12 8Z' fill='url(%23g)' fill-opacity='0.2' stroke='url(%23g)' stroke-width='1'/%3E%3C/svg%3E" type="image/svg+xml">

    <!-- Google Fonts: Inter & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="review-page dashboard-page">
    <!-- Die Sidebar wird von shell.js hier eingehängt (vor .app-main) -->
    <div class="app-main">
    <header class="review-header" role="banner">
        <div class="review-header-inner">
            <div class="review-brand">
                <h1>Dashboard</h1>
            </div>
        </div>
    </header>

    <main class="review-main" role="main">
        <div class="review-toolbar">
            <p class="review-subtitle">Kennzahlen aus echten Durchläufen — berechnet aus der Datenbank, nicht aus Beispielwerten.</p>
            <button class="review-refresh" id="refreshBtn" type="button" aria-label="Kennzahlen neu laden">
                <span class="material-symbols-outlined" aria-hidden="true">refresh</span>
                Neu laden
            </button>
        </div>

        <!-- Wird vollständig von dashboard.js befüllt -->
        <div id="dashboardRoot" aria-live="polite">
            <p class="rb-muted">Lade Kennzahlen…</p>
        </div>
    </main>
    </div><!-- /.app-main -->

    <!-- API Config (muss VOR den anderen Skripten geladen werden) -->
    <script src="scripts/config.js"></script>
    <!-- App-Shell (Sidebar, Sessions, Navigation) -->
    <script src="scripts/shell.js"></script>
    <!-- Dashboard Script -->
    <script src="scripts/dashboard.js"></script>
</body>
</html>
